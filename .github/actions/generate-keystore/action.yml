name: Generate PKCS12 Keystore
description: Create a self-signed PKCS12 keystore for tests
inputs:
  keystore_path:
    description: Path to the PKCS12 keystore to create (relative to repo root)
    required: true
  alias:
    description: Alias for the key entry
    required: false
    default: familyties
  dname:
    description: Distinguished name for the certificate
    required: false
    default: "CN=localhost, OU=Family Ties, O=Arc-E-Tect, L=Amsterdam, S=NH, C=NL"
  key_alg:
    description: Key algorithm
    required: false
    default: RSA
  key_size:
    description: Key size
    required: false
    default: '2048'
  validity_days:
    description: Certificate validity in days
    required: false
    default: '825'
  ssl_keystore_password:
    description: Password for the keystore and key
    required: true
runs:
  using: composite
  steps:
    - name: Generate keystore
      shell: bash
      run: |
        set -euo pipefail

        if [ -z "${{ inputs.ssl_keystore_password }}" ]; then
          echo "ssl_keystore_password input is required" >&2
          exit 1
        fi

        DEST_DIR=$(dirname "${{ inputs.keystore_path }}")
        mkdir -p "$DEST_DIR"
        rm -f "${{ inputs.keystore_path }}"

        keytool -genkeypair \
          -alias "${{ inputs.alias }}" \
          -keyalg "${{ inputs.key_alg }}" \
          -keysize "${{ inputs.key_size }}" \
          -validity "${{ inputs.validity_days }}" \
          -storetype PKCS12 \
          -keystore "${{ inputs.keystore_path }}" \
          -storepass "${{ inputs.ssl_keystore_password }}" \
          -keypass "${{ inputs.ssl_keystore_password }}" \
          -dname "${{ inputs.dname }}"

        ls -l "${{ inputs.keystore_path }}"
